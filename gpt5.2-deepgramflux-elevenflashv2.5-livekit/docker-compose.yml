services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  livekit-server:
    image: livekit/livekit-server:latest
    network_mode: host
    depends_on:
      - redis
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - "0.0.0.0"
        rtc:
          port_range_start: 7882
          port_range_end: 7892
          use_external_ip: false
        redis:
          address: localhost:6379
        keys:
          devkey: secret
        logging:
          level: info

  livekit-sip:
    image: livekit/sip:latest
    network_mode: host
    depends_on:
      - livekit-server
      - redis
    environment:
      SIP_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://localhost:7880
        redis:
          address: localhost:6379
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: false
        log_level: info
