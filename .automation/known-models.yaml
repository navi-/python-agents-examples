# Known Models Manifest
#
# This file tracks available models from each provider. The trigger detector
# compares this manifest against the component registry to find new models
# that need examples generated.
#
# To add a new model:
# 1. Add it here under the appropriate provider/category
# 2. Run: generate-examples detect --provider <provider> --auto-generate
# 3. The system will detect the new model and generate all combinations
#
# Alternatively, run directly:
#   generate-examples trigger --type llm --key <new-key>
#
# Keys must match registry.py entries. New keys (not in registry) trigger
# generation after you also add them to registry.py.

